name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: swimcoach
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swimcoach
        run: uv run alembic upgrade head

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright .

      - name: Security scan
        run: uv run bandit -r app

      # `uv audit` reads uv.lock natively and is faster, but is still experimental/unstable
      # (https://astral.sh/blog/uv-audit) as of June 2026 - switch to it once it stabilizes.
      - name: Dependency vulnerability scan
        run: |
          uv export --format requirements.txt --no-hashes -o requirements.txt > /dev/null
          uvx pip-audit -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: ci-only-placeholder-not-a-real-secret
          ANTHROPIC_API_KEY: ci-only-placeholder-not-a-real-key
          VOYAGE_API_KEY: ci-only-placeholder-not-a-real-key
        run: uv run pytest -v
