name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright .

      - name: Security scan
        run: uv run bandit -r app

      # `uv audit` reads uv.lock natively and is faster, but is still experimental/unstable
      # (https://astral.sh/blog/uv-audit) as of June 2026 - switch to it once it stabilizes.
      - name: Dependency vulnerability scan
        run: |
          uv export --format requirements.txt --no-hashes -o requirements.txt > /dev/null
          uvx pip-audit -r requirements.txt

      - name: Run tests
        run: uv run pytest -v
