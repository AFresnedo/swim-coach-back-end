name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSH_HOST: ${{ secrets.DROPLET_HOST }}
    steps:
      - name: Configure SSH key
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          printf '%s\n' "$SSH_KEY" > "$RUNNER_TEMP/deploy_key"
          chmod 600 "$RUNNER_TEMP/deploy_key"

      - name: Migrate
        run: |
          ssh -o StrictHostKeyChecking=no -i "$RUNNER_TEMP/deploy_key" deploy@"$SSH_HOST" bash -s <<'EOF'
          cd /infra
          git pull
          docker compose pull backend
          docker compose run --rm backend alembic upgrade head
          EOF

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i "$RUNNER_TEMP/deploy_key" deploy@"$SSH_HOST" bash -s <<'EOF'
          cd /infra
          docker compose up -d --no-deps backend
          EOF

      - name: Smoke test
        run: |
          ssh -o StrictHostKeyChecking=no -i "$RUNNER_TEMP/deploy_key" deploy@"$SSH_HOST" bash -s <<'EOF'
          for i in $(seq 1 5); do
            if docker compose -f /infra/docker-compose.yml exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 5 attempts"
          exit 1
          EOF

      - name: Clean up SSH key
        if: always()
        run: rm -f "$RUNNER_TEMP/deploy_key"
