name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Migrate
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            docker compose -f /opt/swimcoach/docker-compose.yml pull backend
            docker compose -f /opt/swimcoach/docker-compose.yml run --rm backend alembic upgrade head

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: docker compose -f /opt/swimcoach/docker-compose.yml up -d --no-deps backend

      - name: Smoke test
        run: |
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DROPLET_HOST }}/api/health)
            if [ "$STATUS" = "200" ]; then echo "Health check passed" && exit 0; fi
            echo "Attempt $i failed (HTTP $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 5 attempts" && exit 1
