# Local dev dependencies only - the app itself runs natively via
# `uv run uvicorn app.main:app --reload` for fast reload/debugging. This is
# distinct from ../infra/docker-compose.yml, which is the production deploy
# stack (includes the built app images, Caddy, etc).
services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: swimcoach
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
